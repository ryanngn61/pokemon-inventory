<!DOCTYPE html>
<html>
<head>
    <title>Pokemon Inventory</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Pokemon Inventory</h1>

<input type="text" id="searchInput" placeholder="Search cards...">

<div id="cards"></div>

<script src="script.js"></script>
</body>
</html>
